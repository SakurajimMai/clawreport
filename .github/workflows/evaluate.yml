name: OpenClaw 评估报告

on:
  schedule:
    - cron: "0 0 * * 1" # 每周一 UTC 0:00 运行
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Crawl GitHub projects
        run: python src/crawler.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: AI Evaluation
        run: python src/evaluator.py
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      - name: Generate report
        run: python src/generator.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "chore: update evaluation $(date +%Y-%m-%d)"
          git push
